<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libby to Clippings Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #666; line-height: 1.5; }
        .upload-area { margin: 20px 0; padding: 20px; border: 2px dashed #3498db; border-radius: 8px; text-align: center; background-color: #fbfbfc; transition: background 0.2s; }
        .upload-area:hover { background-color: #f1f8ff; }
        input[type="file"] { cursor: pointer; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; margin-bottom: 20px; background-color: #fafafa; }
        button { background-color: #3498db; color: #fff; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .badge { display: inline-block; background-color: #2ecc71; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Libby to Clippings Converter <span class="badge">Chronological Sort ON</span></h1>
    <p>Upload your Libby JSON file here. This tool will automatically convert it into the Kindle <code>My Clippings.txt</code> format, explicitly sorted from your <strong>earliest highlight to your latest</strong>.</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".json">
    </div>

    <textarea id="output" placeholder="Your chronological clippings will appear here..." readonly></textarea>
    
    <button id="downloadBtn" disabled>Download .txt File</button>
</div>

<script>
    let currentFileName = "My Clippings.txt";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        currentFileName = file.name.replace('.json', '_clippings.txt');
        
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                const title = data.readingJourney?.title?.text || "Unknown Title";
                const author = data.readingJourney?.author || "Unknown Author";
                let output = "";

                if (data.highlights && Array.isArray(data.highlights)) {
                    
                    // Force a strict chronological sort (earliest date first) into a new array
                    const chronologicalHighlights = [...data.highlights].sort((a, b) => {
                        const timeA = a.timestamp || 0;
                        const timeB = b.timestamp || 0;
                        return timeA - timeB; 
                    });

                    chronologicalHighlights.forEach(hl => {
                        const d = new Date(hl.timestamp);
                        
                        // Strict Kindle Date Formatting (e.g., Sunday, June 21, 2026 1:13:19 PM)
                        const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                        const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
                        const formattedDate = `${dateStr} ${timeStr}`;
                        
                        const locationStr = hl.chapter ? `Chapter: ${hl.chapter}` : `Percent: ${Math.round(hl.percent * 100)}%`;
                        
                        if (hl.quote) {
                            output += `${title} (${author})\n`;
                            output += `- Your Highlight on ${locationStr} | Added on ${formattedDate}\n\n`;
                            output += `${hl.quote}\n`;
                            output += `==========\n`;
                        }
                        
                        if (hl.note) {
                            output += `${title} (${author})\n`;
                            output += `- Your Note on ${locationStr} | Added on ${formattedDate}\n\n`;
                            output += `${hl.note}\n`;
                            output += `==========\n`;
                        }
                    });
                    
                    document.getElementById('output').value = output;
                    document.getElementById('downloadBtn').disabled = false;
                } else {
                    alert("No highlights found in this JSON file.");
                }
            } catch (err) {
                alert("Error parsing JSON file. Please ensure it's a valid Libby export.");
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const text = document.getElementById('output').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
