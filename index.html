<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clippings Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #666; line-height: 1.5; }
        .upload-area { margin: 20px 0; padding: 20px; border: 2px dashed #3498db; border-radius: 8px; text-align: center; background-color: #fbfbfc; transition: background 0.2s; }
        .upload-area:hover { background-color: #f1f8ff; }
        input[type="file"] { cursor: pointer; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; margin-bottom: 20px; background-color: #fafafa; }
        button { background-color: #3498db; color: #fff; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .badge { display: inline-block; background-color: #2ecc71; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Universal Clippings Converter <span class="badge">Libby + Kindle + KOReader</span></h1>
    <p>Upload your <strong>Libby JSON</strong> or <strong>Kindle/KOReader TXT</strong> file. The tool automatically merges overlapping notes, standardizes dates, and outputs a minimalist format.</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".json, .txt">
    </div>

    <textarea id="output" placeholder="Your minimalist, chronological clippings will appear here..." readonly></textarea>
    
    <button id="downloadBtn" disabled>Download .txt File</button>
</div>

<script>
    let currentFileName = "My Clippings.txt";

    function formatKindleDate(timestamp) {
        if (!timestamp || isNaN(timestamp)) return "Unknown Date";
        const d = new Date(timestamp);
        const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
        return `${dateStr} ${timeStr}`;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        currentFileName = file.name.replace(/\.[^/.]+$/, "") + '_clean.txt';
        const isJson = file.name.toLowerCase().endsWith('.json');
        
        const reader = new FileReader();
        reader.onload = function(event) {
            // FIX: Normalize hidden KOReader line separators (U+2028) and weird carriage returns into standard \n
            const rawContent = event.target.result;
            const fileContent = rawContent.replace(/\r\n/g, '\n').replace(/[\r\u2028\u2029]/g, '\n');
            
            let parsedItems = [];

            try {
                if (isJson) {
                    // --- PARSE LIBBY JSON ---
                    const data = JSON.parse(fileContent);
                    const title = data.readingJourney?.title?.text || "Unknown Title";
                    const author = data.readingJourney?.author || "Unknown Author";
                    const titleAuthor = `${title} (${author})`;

                    if (data.highlights && Array.isArray(data.highlights)) {
                        data.highlights.forEach(hl => {
                            if (hl.quote || hl.note) {
                                const formattedDate = formatKindleDate(hl.timestamp);
                                const locationStr = hl.chapter ? `Chapter: ${hl.chapter}` : `Percent: ${Math.round(hl.percent * 100)}%`;
                                const actionStr = hl.quote ? "Highlight" : "Note";
                                
                                let contentStr = "";
                                if (hl.quote) contentStr += hl.quote;
                                if (hl.note) contentStr += (contentStr ? "\nNote:\n" : "Note:\n") + hl.note;
                                
                                parsedItems.push({
                                    titleAuthor: titleAuthor,
                                    meta: `- Your ${actionStr} on ${locationStr} | Added on ${formattedDate}`,
                                    content: contentStr.trim(),
                                    timestamp: hl.timestamp || 0,
                                    isNote: false,
                                    loc: locationStr
                                });
                            }
                        });
                    }

                } else {
                    // --- PARSE TXT (KINDLE OR KOREADER) ---
                    if (fileContent.includes("==========")) {
                        // Standard Kindle TXT Parser
                        const blocks = fileContent.split('==========');
                        blocks.forEach(block => {
                            const lines = block.trim().split('\n').map(l => l.trim());
                            if (lines.length < 3) return;
                            
                            const titleAuthor = lines[0];
                            const meta = lines[1];
                            
                            let timestamp = 0;
                            const dateMatch = meta.split('| Added on ');
                            if (dateMatch.length > 1) timestamp = new Date(dateMatch[1]).getTime();

                            const contentStartIndex = lines[2] === "" ? 3 : 2;
                            const content = lines.slice(contentStartIndex).join('\n').trim();

                            let isNote = meta.includes("- Your Note");
                            let loc = "Unknown";
                            let locMatch = meta.match(/(?:at location|on Chapter:)\s+([^ |]+)/);
                            if (locMatch) loc = locMatch[1].split('-')[0];

                            parsedItems.push({ titleAuthor, meta, content, timestamp: isNaN(timestamp) ? 0 : timestamp, isNote, loc });
                        });
                    } else {
                        // KOReader TXT Parser
                        const lines = fileContent.split('\n');
                        
                        // Robust Title Extraction
                        let titleAuthor = "Unknown Title";
                        for (let l of lines) {
                            if (l.trim()) {
                                titleAuthor = l.trim();
                                break;
                            }
                        }

                        let currentChapter = "Unknown";
                        
                        for (let i = 0; i < lines.length; i++) {
                            let line = lines[i].trim();
                            if (!line) continue;
                            
                            if (line.startsWith("Chapter: ")) {
                                currentChapter = line.substring(9).trim();
                            } else if (/^\d+\.\s+Highlight\s+-/.test(line)) {
                                let match = line.match(/^\d+\.\s+Highlight\s+-\s+(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})(.*)/);
                                let dateStr = match ? match[1] : "";
                                let restOfLine = match ? match[2] : "";

                                let content = restOfLine.trim();
                                let j = i + 1;
                                
                                // Gather all text until the next Chapter or Highlight marker
                                while(j < lines.length && !lines[j].trim().startsWith("Chapter: ") && !/^\d+\.\s+Highlight\s+-/.test(lines[j].trim())) {
                                    if (lines[j].trim()) content += "\n" + lines[j].trim();
                                    j++;
                                }
                                i = j - 1; // skip processed lines

                                // Extract Note from Quote
                                let quote = content;
                                let note = "";
                                let noteMatch = content.match(/Note:\s*([\s\S]*)$/);
                                if (noteMatch) {
                                    note = noteMatch[1].trim();
                                    quote = content.substring(0, noteMatch.index).trim();
                                }
                                
                                // Ignore empty auto-generated notes
                                if (note.toLowerCase() === "no notes") note = "";

                                let timestamp = dateStr ? new Date(dateStr.replace(" ", "T")).getTime() : 0;
                                let meta = `- Your Highlight on Chapter: ${currentChapter} | Added on ${formatKindleDate(timestamp)}`;
                                
                                let finalContent = quote;
                                if (note) finalContent += (finalContent ? "\nNote:\n" : "Note:\n") + note;

                                parsedItems.push({
                                    titleAuthor: titleAuthor,
                                    meta: meta,
                                    content: finalContent.trim(),
                                    timestamp: timestamp,
                                    isNote: false,
                                    loc: currentChapter
                                });
                            }
                        }
                    }
                }

                // --- SORT & MERGE PHASE ---
                parsedItems.sort((a, b) => a.timestamp - b.timestamp);

                let mergedItems = [];
                parsedItems.forEach(item => {
                    if (item.isNote) {
                        let prev = mergedItems[mergedItems.length - 1];
                        if (prev && prev.titleAuthor === item.titleAuthor && prev.loc === item.loc && !prev.isNote) {
                            if (item.content) {
                                prev.content += "\nNote:\n" + item.content;
                            }
                            return; 
                        }
                    }
                    mergedItems.push(item);
                });

                // --- FINAL OUTPUT GENERATION ---
                let finalOutput = "";
                mergedItems.forEach((item, index) => {
                    finalOutput += `${item.titleAuthor}\n`;
                    finalOutput += `${item.meta}\n`; 
                    if (item.content) {
                        finalOutput += `${item.content}\n`;
                    }
                    
                    if (index < mergedItems.length - 1) {
                        finalOutput += `\n`;
                    }
                });
                
                if (mergedItems.length > 0) {
                    document.getElementById('output').value = finalOutput;
                    document.getElementById('downloadBtn').disabled = false;
                } else {
                    alert("No valid clippings found in this file.");
                }

            } catch (err) {
                alert("Error processing file. Please ensure it's a valid Libby, Kindle, or KOReader export.");
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const text = document.getElementById('output').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
