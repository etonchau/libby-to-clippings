<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clippings Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #666; line-height: 1.5; }
        .upload-area { margin: 20px 0; padding: 20px; border: 2px dashed #3498db; border-radius: 8px; text-align: center; background-color: #fbfbfc; transition: background 0.2s; }
        .upload-area:hover { background-color: #f1f8ff; }
        input[type="file"] { cursor: pointer; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; margin-bottom: 20px; background-color: #fafafa; }
        button { background-color: #3498db; color: #fff; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .badge { display: inline-block; background-color: #2ecc71; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Universal Clippings Converter <span class="badge">Clean Layout</span></h1>
    <p>Upload your <strong>Libby JSON</strong> or <strong>Kindle TXT</strong> file here. This tool will automatically standardize, strictly sort by time, and output a minimalist format with zero dividers.</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".json, .txt">
    </div>

    <textarea id="output" placeholder="Your formatted, chronological clippings will appear here..." readonly></textarea>
    
    <button id="downloadBtn" disabled>Download .txt File</button>
</div>

<script>
    let currentFileName = "My Clippings.txt";

    function formatKindleDate(timestamp) {
        const d = new Date(timestamp);
        if (isNaN(d.getTime())) return "Unknown Date";
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        const pad = (num) => num.toString().padStart(2, '0');
        return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        currentFileName = file.name.replace(/\.[^/.]+$/, "") + '_formatted.txt';
        const isJson = file.name.toLowerCase().endsWith('.json');
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const fileContent = event.target.result;
            let parsedItems = [];

            try {
                if (isJson) {
                    const data = JSON.parse(fileContent);
                    const title = data.readingJourney?.title?.text || "Unknown Title";
                    const author = data.readingJourney?.author || "Unknown Author";
                    const titleAuthor = `${title} (${author})`;

                    if (data.highlights && Array.isArray(data.highlights)) {
                        data.highlights.forEach(hl => {
                            if (hl.quote || hl.note) {
                                // Formatting the AM/PM time exactly like your screenshot
                                const d = new Date(hl.timestamp);
                                const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                                const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
                                const formattedDate = `${dateStr} ${timeStr}`;

                                const locationStr = hl.chapter ? `Chapter: ${hl.chapter}` : `Percent: ${Math.round(hl.percent * 100)}%`;
                                const actionStr = hl.quote ? "Highlight" : "Note";
                                
                                let contentStr = "";
                                if (hl.quote) contentStr += hl.quote + "\n";
                                if (hl.note) contentStr += (hl.quote ? "Note:\n" : "Note:\n") + hl.note + "\n";
                                
                                parsedItems.push({
                                    titleAuthor: titleAuthor,
                                    meta: `- Your ${actionStr} on ${locationStr} | Added on ${formattedDate}`,
                                    content: contentStr.trim(),
                                    timestamp: hl.timestamp || 0
                                });
                            }
                        });
                    } else {
                        throw new Error("No highlights found in JSON.");
                    }

                } else {
                    const blocks = fileContent.split('==========');
                    blocks.forEach(block => {
                        const lines = block.trim().split('\n').map(l => l.trim());
                        if (lines.length < 3) return;
                        
                        const titleAuthor = lines[0];
                        const meta = lines[1];
                        
                        let timestamp = 0;
                        const dateMatch = meta.split('| Added on ');
                        if (dateMatch.length > 1) {
                            timestamp = new Date(dateMatch[1]).getTime();
                        }

                        const contentStartIndex = lines[2] === "" ? 3 : 2;
                        const content = lines.slice(contentStartIndex).join('\n');

                        parsedItems.push({
                            titleAuthor: titleAuthor,
                            meta: meta,
                            content: content,
                            timestamp: isNaN(timestamp) ? 0 : timestamp
                        });
                    });
                }

                parsedItems.sort((a, b) => a.timestamp - b.timestamp);

                let finalOutput = "";
                parsedItems.forEach((item, index) => {
                    finalOutput += `${item.titleAuthor}\n`;
                    finalOutput += `${item.meta}\n`; 
                    if (item.content) {
                        finalOutput += `${item.content}\n`;
                    }
                    
                    // Add exactly ONE blank line to separate entries
                    if (index < parsedItems.length - 1) {
                        finalOutput += `\n`;
                    }
                });
                
                if (parsedItems.length > 0) {
                    document.getElementById('output').value = finalOutput;
                    document.getElementById('downloadBtn').disabled = false;
                } else {
                    alert("No valid clippings found in this file.");
                }

            } catch (err) {
                alert("Error processing file. Please ensure it's a valid Libby JSON or Kindle TXT export.");
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const text = document.getElementById('output').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
